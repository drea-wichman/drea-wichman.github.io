<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Andrea Wichman &middot; Case Studies</title>
  <meta name="description" content="Cyber security professional focused on governance, risk, and compliance. MSc Information and Cyber Security, Royal Holloway. London-based.">
  <meta property="og:title" content="Andrea Wichman · Cyber Security & GRC">
  <meta property="og:description" content="Cyber security professional focused on governance, risk, and compliance. MSc Information and Cyber Security, Royal Holloway. London-based.">
  <meta property="og:image" content="https://wichman.io/img/og.png">
  <meta property="og:url" content="https://wichman.io/cases.html">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <style>
    /*
    Font:     Advercase (Regular, Bold, Italic)
    URL:      https://youworkforthem.com/font/T25140/advercase
    Foundry:  Indieground Design
    License:  https://www.youworkforthem.com/font-license
    The WebFont(s) listed must follow the YouWorkForThem WebFont license rules.
    All other parties are strictly restricted from using the WebFonts(s) listed
    without a purchased license. All details above must always remain unaltered
    and visible in your CSS.
    */
    @font-face{font-family:"Advercase";src:url("fonts/advercase-regular.woff2") format("woff2"),url("fonts/advercase-regular.woff") format("woff");font-weight:400;font-style:normal;font-display:swap;}
    @font-face{font-family:"Advercase";src:url("fonts/advercase-italic.woff2") format("woff2"),url("fonts/advercase-italic.woff") format("woff");font-weight:400;font-style:italic;font-display:swap;}
    @font-face{font-family:"Switzer Thin";src:url("fonts/switzer-thin.woff2") format("woff2"),url("fonts/switzer-thin.woff") format("woff");font-weight:100;font-style:normal;font-display:swap;}

    @view-transition { navigation: auto; }

    :root {
      --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      --bg: #A8A5A1;
      --text: #141414;
      --ghost: #B0ADA9;
      --rule: #8F8C89;
      --dim: #4A4845;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    *, *::before, *::after { cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='22' height='22' viewBox='0 0 24 24'><path d='M5.5 3 L5.5 17.6 L9.3 13.9 L11.9 19.8 L14.4 18.7 L11.7 12.9 L17 12.9 Z' fill='%23141414'/></svg>") 5 3, auto !important; }

    a:hover, a:hover *, button:hover, button:hover * { cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='22' height='22' viewBox='0 0 24 24'><path d='M5.5 3 L5.5 17.6 L9.3 13.9 L11.9 19.8 L14.4 18.7 L11.7 12.9 L17 12.9 Z' fill='none' stroke='%23141414' stroke-width='1.5' stroke-linejoin='round'/></svg>") 5 3, pointer !important; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Switzer", "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }

    a { color: var(--text); text-decoration: none; }

    ::selection { background: #877F76; }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(14px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .page-head { animation: riseIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both; }
    .lede { animation: riseIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 0.08s; }
    .list-kicker, .sel-block { animation: riseIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 0.16s; }
    .card { animation: riseIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 0.20s; }
    .verdict { animation: riseIn 0.85s cubic-bezier(0.22, 1, 0.36, 1) both; animation-delay: 0.30s; }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 48px 48px 0;
      font-size: 15px;
      letter-spacing: -0.2px;
    }
    .back-link { color: var(--text); }
    .back-link a { color: var(--dim); text-decoration: none; position: relative; transition: color 0.3s ease; }
    .back-link a:hover { color: var(--text); }
    .back-link a:hover .bc-plus { opacity: 1; transform: translate(0, -50%); }
    .bc-plus {
      position: absolute; right: 100%; top: 50%;
      width: 9px; height: 9px;
      padding-right: 3px; box-sizing: content-box;
      opacity: 0; transform: translate(5px, -50%);
      transition: opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1), transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }
    .bc-plus::before {
      content: ""; position: absolute; left: 0; right: 3px; top: 50%;
      height: 1px; background: var(--text);
    }
    .bc-plus::after {
      content: ""; position: absolute; top: 0; bottom: 0; left: calc(50% - 2px);
      width: 1px; background: var(--text);
    }

    main { max-width: 1060px; margin: 0 auto; padding: 64px 48px 56px; }

    .lede {
      font-size: clamp(16px, 1.8vw, 19px);
      line-height: 1.45;
      color: var(--dim);
      max-width: 44em;
      margin-bottom: 56px;
    }

    .list-kicker {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--dim);
      margin-bottom: 9px;
    }

    /* Case selector */
    .sel-block { max-width: 780px; margin-bottom: 44px; }

    .e-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .e-chip {
      background: none;
      border: 0.5px solid var(--rule);
      color: var(--dim);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 6px 11px;
      transition: color 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }
    .e-chip:hover { border-color: var(--text); color: var(--text); }
    .e-chip.on { background: var(--text); color: #E9E5DC; border-color: var(--text); }
    .e-chip:focus-visible { outline: 1px solid var(--text); outline-offset: 3px; }

    .case-list { border-top: 0.5px solid var(--rule); }
    .cl-item {
      width: 100%;
      background: none;
      border: none;
      border-bottom: 0.5px solid var(--rule);
      text-align: left;
      display: grid;
      grid-template-columns: 64px 176px 1fr 50px;
      gap: 20px;
      align-items: baseline;
      padding: 15px 4px;
      font-family: "Switzer", "Helvetica Neue", Helvetica, Arial, sans-serif;
      color: var(--text);
      opacity: 0.34;
      transition: opacity 0.25s ease, padding-left 0.25s ease;
    }
    .cl-item:hover { opacity: 0.72; }
    .cl-item.on { opacity: 1; padding-left: 12px; }
    .cl-item:focus-visible { outline: 1px solid var(--text); outline-offset: 2px; }
    .cl-item .cl-id { font-family: var(--mono); font-size: 12px; letter-spacing: 0.8px; color: var(--dim); }
    .cl-item.on .cl-id { color: var(--text); }
    .cl-item .cl-nm { font-size: 18px; letter-spacing: -0.3px; }
    .cl-item .cl-fw { font-family: var(--mono); font-size: 13px; letter-spacing: 0.4px; color: var(--dim); }
    .cl-item.on .cl-fw { color: var(--text); }
    .cl-item .cl-yr { font-family: var(--mono); font-size: 12px; letter-spacing: 0.8px; color: var(--dim); text-align: right; }

    .cl-more {
      background: none;
      border: none;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      color: var(--dim);
      padding: 14px 4px;
      transition: color 0.2s ease;
    }
    .cl-more:hover { color: var(--text); }
    .cl-more:focus-visible { outline: 1px solid var(--text); outline-offset: 2px; }

    /* Case header block */
    .case-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 28px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.4px;
      border-top: 0.5px solid var(--rule);
      padding-top: 18px;
      margin-bottom: 46px;
      transition: opacity 0.25s ease;
    }
    .case-meta.swapping { opacity: 0; }
    .case-meta .m-label { color: var(--dim); margin-right: 7px; }

    /* Legend line above chart */
    .chart-head {
      display: flex;
      justify-content: flex-start;
      align-items: baseline;
      gap: 22px;
      margin: -30px 0 26px;
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.6px;
      color: var(--dim);
      white-space: nowrap;
      flex-wrap: wrap;
      transition: opacity 0.25s ease;
    }
    .chart-head.swapping { opacity: 0; }

    /* Chart */
    .matrix-wrap {
      overflow-x: auto;
      transition: opacity 0.25s ease;
    }
    .matrix-wrap.swapping { opacity: 0; }
    table.matrix {
      width: 100%;
      border-collapse: collapse;
      font-size: 15px;
      letter-spacing: -0.2px;
    }
    .matrix th, .matrix td {
      padding: 15px 8px;
      border-top: 0.5px solid var(--rule);
      text-align: left;
      vertical-align: baseline;
    }
    .matrix th { font-weight: 400; }
    .matrix thead th {
      border-top: none;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--dim);
      padding-bottom: 11px;
    }
    .matrix td.gap {
      font-size: 14px;
      color: var(--dim);
      line-height: 1.4;
    }
    .matrix td.res { text-align: center; width: 80px; }
    .matrix thead th.res-h { text-align: center; width: 80px; }
    .matrix tr.stage th {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1.2px;
      color: var(--dim);
      border-top: none;
      padding: 30px 8px 4px;
    }
    .matrix tr.stage:first-child th { padding-top: 4px; }
    .mark { font-size: 16px; }
    .mark.fail::after { content: "\2715"; }
    .mark.part::after { content: "\25D0"; }
    .mark.none::after { content: "\25CB"; }
    .mark.na::after { content: "\2013"; }
    .mark.pass::after {
      content: "";
      display: inline-block;
      width: 10px;
      height: 5px;
      border-left: 1px solid var(--text);
      border-bottom: 1px solid var(--text);
      transform: rotate(-45deg) translateY(-2px);
    }

    /* Evidence card: the record for the chosen incident */
    .card {
      background: #1A1916;
      padding: 36px 40px 30px;
    }
    .card .case-meta { border-top: none; padding-top: 0; margin-bottom: 44px; color: #E9E5DC; }
    .card .chart-head { margin: -30px 0 24px; }
    .card .case-meta .m-label { color: #98948C; }
    .card .matrix th, .card .matrix td { border-top: 0.5px solid rgba(233,229,220,0.16); }
    .card .matrix thead th { border-top: none; color: #98948C; }
    .card .matrix th { color: #E9E5DC; }
    .card .matrix tr.stage th { color: #98948C; border-top: none; }
    .card .matrix td.gap { color: #98948C; }
    .card .matrix td.res { color: #E9E5DC; }
    .card .mark.pass::after { border-left-color: #E9E5DC; border-bottom-color: #E9E5DC; }
    .card .chart-head { color: #98948C; }
    .card .chart-head .mark.pass::after { border-left-color: #98948C; border-bottom-color: #98948C; }
    .card, .card *, .card *::before, .card *::after { cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='22' height='22' viewBox='0 0 24 24'><path d='M5.5 3 L5.5 17.6 L9.3 13.9 L11.9 19.8 L14.4 18.7 L11.7 12.9 L17 12.9 Z' fill='%23E9E5DC'/></svg>") 5 3, auto !important; }

    /* Verdict panel */
    .verdict {
      margin-top: 40px;
      border-top: 0.5px solid var(--rule);
      padding-top: 24px;
      min-height: 120px;
      transition: opacity 0.25s ease;
    }
    .verdict.swapping { opacity: 0; }
    .verdict .v-kicker {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 1.2px;
      color: var(--dim);
      margin-bottom: 12px;
      text-transform: uppercase;
    }
    .verdict .v-body {
      font-size: 15px;
      line-height: 1.5;
      max-width: 62ch;
      color: var(--text);
    }
    .verdict a.v-link {
      display: inline-block;
      margin-top: 12px;
      font-size: 15px;
      color: var(--dim);
      text-decoration: none;
      transition: color 0.3s ease;
    }
    .verdict a.v-link:hover { color: var(--text); }
    .verdict a.v-link::before { content: "+"; }

    @media (prefers-reduced-motion: reduce) {
      .page-head, .lede, .list-kicker, .sel-block, .card, .case-meta, .chart-head, .matrix-wrap, .verdict { animation: none; }
      .matrix-wrap, .verdict, .cl-item, .case-meta, .chart-head { transition: none; }
    }

    @media (max-width: 760px) {
      .page-head { padding: 28px 20px 0; }
      main { padding: 44px 20px 40px; }
      .card { padding: 22px 18px 18px; }
      .matrix th, .matrix td { padding: 12px 6px; }
      .matrix td.gap { font-size: 13px; }
      .cl-item { grid-template-columns: 50px 1fr auto; gap: 6px 14px; padding: 13px 2px; }
      .cl-item .cl-nm { font-size: 17px; }
      .cl-item .cl-fw { grid-column: 2 / 4; }
      .cl-item .cl-yr { grid-row: 1; grid-column: 3; }
    }
  </style>
</head>
<body>

  <header class="page-head">
    <div class="back-link"><a href="/"><span class="bc-plus" aria-hidden="true"></span>index</a> / case studies</div>
  </header>

  <main>
    <p class="lede">Point-in-time analyses of published incidents, each mapped to the framework in effect at the time.<br>Independent work drawn from public reporting, not audits or compliance assessments.</p>

    <div class="list-kicker">INCIDENTS</div>
    <div class="sel-block">
      <div class="e-chips" id="chips" hidden></div>
      <div class="case-list" id="case-list" role="tablist" aria-label="Select a case"></div>
      <button class="cl-more" id="cl-more" hidden></button>
    </div>

    <div class="card">
      <div class="case-meta" id="case-meta"></div>

      <div class="chart-head" id="chart-head"></div>

      <div class="matrix-wrap" id="matrix-wrap"></div>
    </div>

    <div class="verdict" id="verdict" aria-live="polite"></div>
  </main>

  <script>
    var CASES = {
      wannacry: {
        sel: { id: "CS-001", nm: "NHS", fw: "ISO 27001:2013", fwShort: "ISO 27001", yr: "2017" },
        meta: [["SECTOR","Healthcare"],["REGION","UK"],["THREAT","WannaCry"],["ENFORCEMENT","None reported"]],
        colHead: "CONTROL",
        rows: [
          { c: "A.12.6.1 Technical vulnerability management", g: "Patch available two months before impact. Alerts sent. No one verified they were acted on.", m: "fail" },
          { c: "A.8.1 Asset management", g: "No centralised inventory. Windows XP still live on the day of the attack.", m: "fail" },
          { c: "A.13.1.3 Network segregation", g: "One flat network. A single entry point reached trusts across England within hours.", m: "fail" },
          { c: "A.16.1 Incident management", g: "No national plan, no designated lead, no rehearsal. Communications collapsed.", m: "fail" },
          { c: "A.18.1 Compliance with legal requirements", g: "Patient data on unpatched, unsupported systems. Data Protection Act obligations unmet.", m: "fail" }
        ],
        verdict: {
          b: "Microsoft patched MS17-010 on 14 March 2017, two months before impact. Department of Health and NHS Digital warnings pre-dated the attack. 81 of 236 trusts were disrupted, around 19,000 appointments cancelled, at a cost of \u00a392m. Every control failed. Recovery was improvised.",
          link: "https://github.com/drea-wichman/case-studies/blob/main/nhs-wannacry-ransomware-2017.md",
          label: "Read the full write-up on GitHub"
        }
      },
      agco: {
        sel: { id: "CS-002", nm: "AGCO", fw: "NIST CSF 1.1", fwShort: "NIST CSF", yr: "2022" },
        meta: [["SECTOR","Agricultural manufacturing"],["REGION","Global"],["THREAT","Black Basta"],["ENFORCEMENT","None reported"]],
        colHead: "FUNCTION",
        rows: [
          { c: "Identify", g: "Two FBI warnings named the threat. No visible reassessment or response followed.", m: "fail" },
          { c: "Protect", g: "Ransomware crossed facilities in France, Germany, and China within hours. No effective segmentation.", m: "fail" },
          { c: "Detect", g: "Data stolen and systems encrypted before AGCO knew it was under attack.", m: "fail" },
          { c: "Respond", g: "Systems shut down fast, disclosure next day, law enforcement engaged. Organised.", m: "pass" },
          { c: "Recover", g: "Two weeks to restore, during planting season. Backups incomplete, untested, or reachable.", m: "part" }
        ],
        verdict: {
          b: "Black Basta struck on 5 May 2022, during peak planting season. Two FBI notices about the group preceded the attack. Identification, protection, and detection failed, but the response held: operations were shut down and contained within days. Recovery still ran longer than the containment.",
          link: "https://github.com/drea-wichman/case-studies/blob/main/agco-ransomware-2022.md",
          label: "Read the full write-up on GitHub"
        }
      },
      salesloft: {
        sel: { id: "CS-003", nm: "Salesloft Drift", fw: "NCSC Supply Chain Principles v1.0", fwShort: "NCSC", yr: "2025" },
        meta: [["SECTOR","Software / SaaS"],["REGION","Global"],["THREAT","UNC6395"],["ENFORCEMENT","None reported"]],
        colHead: "PRINCIPLE",
        gapHead: "FINDING",
        legendExtra: ["none", "na"],
        rows: [
          { s: "STAGE I \u00b7 UNDERSTAND THE RISKS" },
          { c: "1. Understand what needs to be protected and why", g: "Whether buyers had mapped what the token could reach is not publicly known. The scope became apparent only after the breach.", m: "part" },
          { c: "2. Know who your suppliers are", g: "Customers knew Drift. The attack ran through the GitHub of its parent, Salesloft, one layer removed from anything a customer would have assessed.", m: "part" },
          { c: "3. Understand the security risk posed by your supply chain", g: "Not that the chatbot would malfunction, but that its credentials could be stolen and used to reach Salesforce. The one principle that named the risk that materialized.", m: "pass" },

          { s: "STAGE II \u00b7 ESTABLISH CONTROL" },
          { c: "4. Communicate your view of security needs to your suppliers", g: "Salesloft published, buyers evaluated. Standardized MSA, no negotiated security terms. Evaluate or leave were the options.", m: "none" },
          { c: "5. Set and communicate minimum security requirements", g: "A buyer applying this principle would have approved Salesloft. Buyers could verify, not dictate. The controls that failed were ones the vendor claimed to have in place.", m: "none" },
          { c: "6. Build security considerations into your contracting processes", g: "Addresses supply chain depth. No subcontractor was involved. The attack ran through Salesloft's own infrastructure and its own product.", m: "na" },
          { c: "7. Meet your own security responsibilities as a supplier", g: "SOC 2 Type 2, ISO 27001, ISO 27701. GitHub compromised for three months without detection. Initial access never disclosed.", m: "fail" },
          { c: "8. Raise awareness of security within your supply chain", g: "Training at onboarding and annually thereafter. The GitHub compromise still ran roughly three months undetected.", m: "part" },
          { c: "9. Provide support for security incidents", g: "Customers notified 20 August, two days after exfiltration ended. Mandiant engaged publicly. How the attackers first got in has never been disclosed.", m: "part" },

          { s: "STAGE III \u00b7 CHECK YOUR ARRANGEMENTS" },
          { c: "10. Build assurance activities into your supply chain management", g: "Audited certifications were published and accessible. Salesloft's standardized MSA grants no right to audit. The NCSC specifically recommends building one into the contract.", m: "none" },

          { s: "STAGE IV \u00b7 CONTINUOUS IMPROVEMENT" },
          { c: "11. Encourage continuous improvement within your supply chain", g: "No pathway for individual buyer input under a standardized SaaS agreement. Customers could observe what Salesloft chose to publish.", m: "none" },
          { c: "12. Build trust with suppliers", g: "Transactional. Sign the MSA, connect the integration, use the product. What the contract established was access, not partnership.", m: "none" }
        ],
        verdict: {
          b: "UNC6395 held access to Salesloft's GitHub from March 2025 and spent ten days in August exporting data from customer Salesforce environments. More than 700 organizations were potentially impacted through a connection each had approved. Their own controls did not fail. Of the NCSC's 12 principles, one failed at the supplier and five had no mechanism a buyer could use. Guidance that assumes leverage the market does not provide is aspiration without mechanism.",
          link: "https://github.com/drea-wichman/case-studies/blob/main/salesloft-drift-supply-chain-2025.md",
          label: "Read the full write-up on GitHub"
        }
      }
    };

    // Display order. Newest first. New cases go on top.
    var ORDER = ["salesloft", "agco", "wannacry"];

    // Framework filter chips. Flip to true once any single framework holds
    // two or more cases; until then a chip returns one row and argues nothing.
    var SHOW_FILTERS = false;

    // Rows shown before the list collapses behind "view all".
    var CAP = 8;

    // Base assessment scale. Shown on every case, whether or not each mark occurs:
    // an absent mark is part of the finding. Cases add to this via legendExtra.
    var BASE_LEGEND = ["fail", "part", "pass"];

    var LEGEND = {
      fail: "failed",
      part: "partial",
      pass: "held",
      none: "no mechanism",
      na:   "not applicable"
    };

    var wrap = document.getElementById('matrix-wrap');
    var legendEl = document.getElementById('chart-head');
    var metaEl = document.getElementById('case-meta');
    var listEl = document.getElementById('case-list');
    var chipsEl = document.getElementById('chips');
    var moreEl = document.getElementById('cl-more');
    var verdict = document.getElementById('verdict');

    var current = ORDER[0];
    var filter = "ALL";
    var expanded = false;

    function visibleKeys() {
      return ORDER.filter(function(k) {
        return filter === "ALL" || CASES[k].sel.fwShort === filter;
      });
    }

    function buildChips() {
      if (!SHOW_FILTERS) { chipsEl.hidden = true; return; }
      var seen = [];
      ORDER.forEach(function(k) {
        var f = CASES[k].sel.fwShort;
        if (seen.indexOf(f) === -1) seen.push(f);
      });
      chipsEl.hidden = false;
      chipsEl.innerHTML = ["ALL"].concat(seen).map(function(c) {
        return '<button class="e-chip' + (filter === c ? ' on' : '') + '" data-chip="' + c + '">' + c + '</button>';
      }).join('');
      chipsEl.querySelectorAll('[data-chip]').forEach(function(b) {
        b.addEventListener('click', function() {
          filter = b.dataset.chip;
          expanded = false;
          var keys = visibleKeys();
          if (keys.indexOf(current) === -1 && keys.length) selectCase(keys[0], true);
          else buildSelector();
        });
      });
    }

    function buildSelector() {
      var keys = visibleKeys();
      var shown = expanded ? keys : keys.slice(0, CAP);

      listEl.innerHTML = shown.map(function(k) {
        var d = CASES[k].sel;
        return '<button class="cl-item' + (k === current ? ' on' : '') + '" role="tab"' +
               ' aria-selected="' + (k === current) + '" data-case="' + k + '">' +
               '<span class="cl-id">' + d.id + '</span>' +
               '<span class="cl-nm">' + d.nm + '</span>' +
               '<span class="cl-fw">' + d.fw + '</span>' +
               '<span class="cl-yr">' + d.yr + '</span>' +
               '</button>';
      }).join('');

      listEl.querySelectorAll('.cl-item').forEach(function(b) {
        b.addEventListener('click', function() { selectCase(b.dataset.case, true); });
      });

      if (keys.length > CAP) {
        moreEl.hidden = false;
        moreEl.textContent = expanded ? 'SHOW FEWER' : 'VIEW ALL (' + keys.length + ')';
      } else {
        moreEl.hidden = true;
      }
    }

    moreEl.addEventListener('click', function() { expanded = !expanded; buildSelector(); });

    function buildMatrix(c) {
      var html = '<table class="matrix"><thead><tr>' +
        '<th>' + c.colHead + '</th><th class="res-h">RESULT</th><th>' +
        (c.gapHead || 'GAP') + '</th>' +
        '</tr></thead><tbody>';
      c.rows.forEach(function(r) {
        if (r.s) {
          html += '<tr class="stage"><th colspan="3">' + r.s + '</th></tr>';
          return;
        }
        html += '<tr><th>' + r.c + '</th>' +
                '<td class="res"><span class="mark ' + r.m + '"></span></td>' +
                '<td class="gap">' + r.g + '</td></tr>';
      });
      html += '</tbody></table>';
      return html;
    }

    function buildLegend(c) {
      var keys = BASE_LEGEND.concat(c.legendExtra || []);
      return keys.map(function(k) {
        return '<span><span class="mark ' + k + '"></span>&nbsp; ' + LEGEND[k] + '</span>';
      }).join('');
    }

    function buildMeta(c) {
      return (c.meta || []).map(function(m) {
        return '<span><span class="m-label">' + m[0] + '</span>' + m[1] + '</span>';
      }).join('');
    }

    function buildVerdict(v) {
      return '<div class="v-kicker">VERDICT</div>' +
             '<div class="v-body">' + v.b + '</div>' +
             '<a class="v-link" href="' + v.link + '" target="_blank" rel="noopener">' + v.label + '</a>';
    }

    function paint(c) {
      metaEl.innerHTML = buildMeta(c);
      legendEl.innerHTML = buildLegend(c);
      wrap.innerHTML = buildMatrix(c);
      verdict.innerHTML = buildVerdict(c.verdict);
    }

    function selectCase(key, animate) {
      var c = CASES[key];
      if (!c) return;
      current = key;
      buildSelector();
      if (animate) {
        [wrap, verdict, metaEl, legendEl].forEach(function(el) { el.classList.add('swapping'); });
        setTimeout(function() {
          paint(c);
          [wrap, verdict, metaEl, legendEl].forEach(function(el) { el.classList.remove('swapping'); });
        }, 250);
      } else {
        paint(c);
      }
    }

    buildChips();
    selectCase(ORDER[0], false);

  </script>

</body>
</html>
