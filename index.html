    /* hairline plus: fades in against the hovered nav word */

    .nav-plus {
      position: absolute; right: 100%; top: 50%;

    .nav-plus::before {

    .nav-plus::after {

    /* Entrance sequence */
    #entrance {
      position: fixed;
      inset: 0;
      background: var(--bg);

      justify-content: center;

      transition: opacity 0.45s ease;
    }
    html.entering #entrance,
    #entrance.fading { display: flex; }
    #entrance.done { opacity: 0; pointer-events: none; }
    #entrance circle {
      stroke-dasharray: 170;
      stroke-dashoffset: 170;
    }
    html.entering #entrance circle,
    #entrance.fading circle {
      animation: wmDrawCircle 0.55s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
    }
    #entrance .plv,
    #entrance .plh {
      stroke-dasharray: 13;

    }
    html.entering #entrance .plv,
    #entrance.fading .plv {
      animation: wmDrawLine 0.22s ease-out 0.62s forwards;
    }
    html.entering #entrance .plh,
    #entrance.fading .plh {
      animation: wmDrawLine 0.22s ease-out 0.85s forwards;
    }
    @keyframes wmDrawCircle { to { stroke-dashoffset: 0; } }
    @keyframes wmDrawLine { to { stroke-dashoffset: 0; } }
    html.entering .name,
    html.entering .corner,
    html.entering .nav-links {
      animation-play-state: paused;
    }

    /* Panel choreography */
    .name { transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1); }

  <script>
    // Entrance sequence: finish on timer, click, or keypress. Once per session.
    (function() {
      var root = document.documentElement;
      var overlay = document.getElementById('entrance');
      if (!root.classList.contains('entering')) {
        if (overlay) overlay.remove();
        return;
      }
      var finished = false;
      function finish() {
        if (finished) return;
        finished = true;
        try { sessionStorage.setItem('wm-entered', '1'); } catch (e) {}
        overlay.classList.add('fading', 'done');
        root.classList.remove('entering');
        setTimeout(function() { overlay.remove(); }, 500);
        document.removeEventListener('click', finish);
        document.removeEventListener('keydown', finish);
      }
      document.addEventListener('click', finish);
      document.addEventListener('keydown', finish);
      setTimeout(finish, 1350);
    })();
