<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 &middot; Andrea Wichman</title>
  <style>
    @font-face{font-family:"Switzer Thin";src:url("fonts/switzer-thin.woff2") format("woff2"),url("fonts/switzer-thin.woff") format("woff");font-weight:100;font-style:normal;font-display:swap;}

    @view-transition { navigation: auto; }

    :root {
      --bg: #A8A5A1;
      --text: #141414;
      --ghost: #B0ADA9;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    *, *::before, *::after { cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='22' height='22' viewBox='0 0 24 24'><path d='M5.5 3 L5.5 17.6 L9.3 13.9 L11.9 19.8 L14.4 18.7 L11.7 12.9 L17 12.9 Z' fill='%23141414'/></svg>") 5 3, auto !important; }

    a:hover, a:hover * { cursor: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='22' height='22' viewBox='0 0 24 24'><path d='M5.5 3 L5.5 17.6 L9.3 13.9 L11.9 19.8 L14.4 18.7 L11.7 12.9 L17 12.9 Z' fill='none' stroke='%23141414' stroke-width='1.5' stroke-linejoin='round'/></svg>") 5 3, pointer !important; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: "Switzer", "Helvetica Neue", Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 28px;
    }

    .code {
      font-family: "Switzer Thin", "Helvetica Neue", Helvetica, Arial, sans-serif;
      font-weight: 100;
      font-size: 64px;
      line-height: 1;
      color: var(--text);
      letter-spacing: 0.04em;
      user-select: none;
    }

    a {
      color: var(--text);
      text-decoration: none;
      font-size: 15px;
      letter-spacing: -0.2px;
    }
    a::before { content: "\2190\00a0 "; }
    a { color: #4A4845; transition: color 0.3s ease; }
    a:hover { color: #141414; }

    ::selection { background: #877F76; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <a href="/">Index</a>
</body>
</html>
